<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unloq — Learn every day. Earn your screen time.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a2e;
    }
    header {
      background: #6366f1;
      padding: 20px 24px;
    }
    .logo { font-size: 22px; font-weight: 800; color: #fff; }
    .hero {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 64px;
      text-align: center;
    }
    .emoji { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 36px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    .sub { font-size: 18px; color: #6b7280; margin-bottom: 40px; line-height: 1.6; }
    .links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
    .links a {
      color: #6366f1;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 2px solid #e0e7ff;
      padding-bottom: 2px;
    }
    .links a:hover { border-color: #6366f1; }
    footer {
      text-align: center;
      font-size: 13px;
      color: #9ca3af;
      padding: 32px 24px;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">🔓 Unloq</span>
  </header>
  <div class="hero">
    <div class="emoji">📖</div>
    <h1>Learn every day.<br/>Earn your screen time.</h1>

    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
    </div>
  </div>
  <footer>&copy; 2026 Unloq</footer>

</html>
